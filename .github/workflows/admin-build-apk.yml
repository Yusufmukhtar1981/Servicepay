name: Build ServicePay Admin APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ServicePay_Admin_Phase1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze admin source
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build Admin APK
        run: flutter build apk --release

      - name: Upload ServicePay Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: ServicePay-Admin-APK
          path: ServicePay_Admin_Phase1/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error